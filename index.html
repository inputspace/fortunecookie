<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;background:#0c0a06;color:#f5e6c8;
  font-family:'Cormorant Garamond',Georgia,serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;

}
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(180,130,50,0.13) 0%,transparent 70%),

    #0c0a06;

}
.wrap{
  position:relative;z-index:1;width:100%;max-width:680px;

}

.eyebrow{
  font-family:'DM Mono',monospace;font-size:11px;

}
h1{font-size:clamp(2.2rem,6vw,3.2rem);font-weight:600;line-height:1.1;letter-spacing:-.01em}
h1 em{font-style:italic;color:#d4a94a}
.sub{margin-top:.75rem;font-size:1.05rem;color:rgba(245,230,200,.5);font-style:italic;line-height:1.5}
.crack-btn{
  position:relative;background:none;
  border:1px solid rgba(212,169,74,.45);color:#d4a94a;

}
.crack-btn:hover:not(:disabled){border-color:#d4a94a;box-shadow:0 0 28px rgba(212,169,74,.12)}
.crack-btn:disabled{opacity:.35;cursor:not-allowed}
.loader{display:none;flex-direction:column;align-items:center;gap:1rem}
.loader.on{display:flex}

@keyframes wobble{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.loader p{font-style:italic;color:rgba(245,230,200,.45);font-size:1rem}
.card{
  width:100%;background:rgba(212,169,74,.05);

  padding:2.5rem 2rem 2rem;text-align:center;
  display:none;position:relative;overflow:hidden;
}
.card.on{display:block;animation:unfold .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes unfold{
  from{opacity:0;transform:scaleY(.55) translateY(12px);transform-origin:top}
  to{opacity:1;transform:scaleY(1) translateY(0)}
}
.card::before{
  content:'\2726  \2726  \2726';
  position:absolute;top:1.1rem;left:50%;transform:translateX(-50%);
  color:rgba(212,169,74,.2);font-size:9px;letter-spacing:.4em;
}

}
.fortune-text::before{content:'\201C';color:#d4a94a;font-size:1.8em;line-height:.5;vertical-align:-.2em;margin-right:2px}
.fortune-text::after{content:'\201D';color:#d4a94a;font-size:1.8em;line-height:.5;vertical-align:-.2em;margin-left:2px}
.divider{width:40px;height:1px;background:rgba(212,169,74,.28);margin:1.2rem auto}

}

.num{

  border:1px solid rgba(212,169,74,.13);padding:3px 10px;border-radius:100px;
}

  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;padding:.5rem;transition:color .2s;display:none;
}
.again-btn.on{display:block}
.again-btn:hover{color:#d4a94a}
.err{color:rgba(220,90,70,.75);font-size:.9rem;font-style:italic;display:none;text-align:center}
.err.on{display:block}

<script>
const POSTS = ["Sunil Sir’s Posts I’ve never seen a more empty Starbucks in my life. There was only one customer there. #faqeerism - It doesn’t matter if you are Starbucks. I f you are at wrong location, you will find no takers. Location… location… location !!! I wonder if the prices of coffee should also follow the surge pricing of Uber. Higher in expensive malls and lower in off locations like thi s, where even a Starbucks can’t guarantee footfall. After all, a big chunk of the cost is rentals !","On my last visit to Delhi, I saw 8 chemist shops within 50 me ters. I laughed - This area should be called “Dawa lane”… 😀 Well, from that logic every lane in Gurgaon should be called - Daaru lane… 😂 One of them had people queuing and rest were counting flies. I wondered why it was so? Then got to know - This guy is a semi doctor. He prescribes m edicines and charges only 30 rupees. Me - But this is a dangerous practice. ( While knowing fully Sunil Sir’s Posts 1 well that it is common in NCR). My friend - Yeah for his customer class, saving 200 rupees on doctor’s fee makes a huge difference. And he never lets any customer go without buying. If he sees that the person last in queue is getting restless and is goin g back, he will immediately attend to that customer and make them jump queue.","Think about it… #faqeerism- Everyone is “selling” something to the oth er. Products, expertise, experience, time, truth, happiness, lie s, scams, frauds, deceipts, insecurities, emotions, relation s… The hollower the commodity, the louder the sales pitch. Your favourite Cricket and cinema Hero selling Poison dressed as colas, pan masalas and what not ! #faqeerism - Message is more important than the messen ger. Focus on what’s in it for you than who is selling it. Content is more important than container. सोना अगर कीचड़ में भी पड़ा हो तो भी उसकी कीमत कम नहीं हो जाती. और कचरा अगर gift wrap में भी मिले तो भी काम नहीं आता. #chalfaqeera - Awkaen the Faqeera within… by knowing w hat’s सोना and what’s कचरा for you. Sunil Sir’s Posts 9 This morning, when I was booking a taxi, the app flashed a me ssage - Our drivers are spending time with family. Give us so me more time. 😀 So cheeky and made me laugh a lot. I like those Nouns ( People, places, things) that make me lau gh. #faqeerism - We think too much of ourselves. We are ju st one of the nouns. 😉","Not saying don't work hard, not saying don't eat healthy, not saying don't work out, not saying don't make money, not sayin g don't have ambitions, not saying don't fight for your dream s, your rights... But 24 X 7 ? Being your own biggest tormentor? Sunil Sir’s Posts 26 How much time or effort does it take to be nice, kind, relaxe d and leave rest to someone up there who moves the threads? Eat slow, relish, smile, have a nice cup of tea ( sugar/ no s 🙂 ugar your choice ), listen to Kishor Da/ Rafi Saab, sing a long, talk to people you love, go to sleep with gratitude and peace. Very difficult, eh? Kya pata - Kal ho na ho ! #chalfaqeera - Awaken the Faqeera within... aur kya ! The world is full of people suffering from the effects of the ir own unlived life. They become bitter, critical, or rigid, not because the world is cruel to them, but because they have betrayed their own in ner possibilities. The artist who never makes art becomes cynical about those wh o do. The lover who never risks loving mocks romance. The thinker who never commits to a philosophy sneers at belie f itself. And yet, all of them suffer, because deep down they know: the life they mock is the life they were meant to live. – Carl Jung","Fast forward to today... I am regularly approached by startups & SMEs exploring exits. My approach is still the same that got me into BITS #faqeerism - PCME. Sunil Sir’s Posts 😀 34 1. English - The Narrative What's your story ? Does the narrative sound right to my ear s? Can the founders communicate their vision clearly and conv incingly to investors, customers and their team? 2. Chemistry - The Relationships How do the co-founders interact with each other? Do I feel co nnected at personal level? Is there trust, camaraderie or is it a fragile arrangement that might fall apart under pressur e? #faqeerism - Great businesses are built on solid relat ionships. 3. Maths - The Market and Numbers How big is the market they're targeting? Do the numbers add u p for growth and a credible exit? #faqeerism - Passion without numbers is a dream not a goal. 4. Physics - The Discipline Is there a structured approach to how they're building their startup? Or is it just individual heroics and an ad hoc appro ach that works? #faqeerism - Gravity and entropy are real. PCME laid the foundation of my education and career, it still serves me well. ❤️ Sunil Sir’s Posts 35 #chalfaqeera - Awaken the Faqeera within.. know your P CME. Do you follow stock markets and invest in them? How do you fe el about it? Greed, Fear, Volatility, absurd valuations, no rationale ! Appears like a circus, right? 😀 What if I give you a magic sauce that will simplify it so muc h that even a child can understand it ?","Here it is... DO NOT try to outsmart the market. Market is ALWAYS right !! #faqeerism - Follow the Trend. Make the trend your fri end. If you look at last 20 years, stock markets have always gone up. ALWAYS !!! Short term falls, volatility - Yes, but over a 5 year, 10 yea r, 20 year... always gone up. #faqeerism - Expand your horizon ! Anything that's fundamentally solid - Nvidia, Meta, MS, Alpha bet, Amazon.... has gone up exponentially and become a Superm odel stock ! Note - And, you know this post is not about stock markets. Ri Sunil Sir’s Posts 36 ght? 😂","#faqeerism - You are like a stock in \"Life market\" ove r 40, 50, 80 years. What did I tell you in para -1 ? The long term trend is ALWAY S positive. You just have to believe the Trend and follow it. Short term turbulence, problems, challenges will come and you may feel that you are being battered and bruised but believe in the Long Term trend and enable it. NEVER short the trend ! #faqeerism - Remain fundamentally solid. Ensure that short term volatility isn't denting your fundamen tals. One day you will become very valuable, hit exponential returns and people will say Ah.... S/he got lucky. 😊 Fundamentals, fundamentals, fundamentals ! Expand the horizon ! Believe and follow the long term trend ! #chalfaqeera - Awaken the Faqeera within.... Do Not Sh ort Sell yourself ! Sunil Sir’s Posts 37 I was in a taxi when I received call from a friend. After I finished the call, the Taxi Captain said \"Whoa Mr. Su nil, you talk like machine gun\" ! 😳 He asked me \"Do you also eat very fast?\" I had to grudgingly say Yes and then he said what I know but don't practice that well. “Mr. Sunil, you must eat slow, chew the food. What's the hurry? Everything else can wait. Eat your food wel l.”","Know what drives innovation? Freedom ? Creativity? Needs ? Wants? #faqeerism - Acceptance of Failure. If you can not accept failures and are so tightly tuned to on ly be successful, efficient, predictable and rigid…. You CAN NOT innovate. That’s why the maverick startups keep emerging, keep disrupti ng the market leaders and keep getting acquired for insane va luations. They can ( and do) start all over again despite failures. A company or society where failure is a stigma isn’t the idea l soil for innovation. Sunil Sir’s Posts 45 #chalfaqeera - Awaken the Faqeera within…. Be a maveri ck, keep the child in you alive and kicking. I got my first successful cybersecurity exit in 2012 !!! I wanted to then move out of B2B and do something in B2C in I ndia. I created initial business plan, the problem, solution, GTM, scale etc and started looking out for a CTO Co founder. I cou ldn’t find any, and eventually dropped the idea. If I had executed that, I would have been running a Billion D ollar company exactly similar to what Urban Clap did much lat er. 😀 OR, that startup may have shut down, I would have lost all my money, energies, spirit and would have been back to corporate world. Who knows what may have happened ! All I know is - I took a different path with different goals, different challenges, different version of success & failure and a different ( and a beautiful ❤️ ) country. The successful manifestation of Urban Clap business model ( I t was called Hyper Local then) was destined to be for someone else and not me. Any regrets? No regrets !","Sunil Sir’s Posts 46 If you are flying a plane and just go one degree here & there , for first few miles, you won’t know the difference. After few miles, you are 10 miles in a different direction, t hen 100 miles and finally you land in a different city than t he one intended. 😀 One degree…. Just one degree change can take your flight to a n absolutely different city. #faqeerism - One decision can create a completely diff erent life.","Life presents multiple choices to us everyday, every moment. Based on our mindset, circumstances and other factors at that moment, we make a decision. That one decision has the power to completely change the life journey. #chalfaqeera - Awaken the Faqeera within… by making th e decision and leaving the manifestation to destiny. This morning , I saw a short 2 minutes war coverage video on a news channel. It showed 3 young soldiers sitting on a tank. They were laughing and it was evident that one of them had cr acked a joke. Sunil Sir’s Posts 47 I was stunned ! These guys exactly know what they have signed up for and what (God forbid) may happen just the next moment. And they were joking and laughing.","We learn to “adjust” early on and continue to do that all our lives. Spouse, children, in laws, neighbors, employer, debtors, rela tives, colleagues…. Adjustment becomes a way of life. And the 4th law of Faqeerism keeps coming into play and they keep getting squeezed out of their space. How long you wanna do it ? #chalfaqeera - Awaken the Faqeera within… by reclaimin g your rightful space. Sunil Sir’s Posts 56 You know what’s the most effortless thing to do? Even easier than breathing ! ( In Delhi / NCR, even breathing requires a great effort. ) Making assumptions !!! It just flows so naturally in most people that it is amazing ! How many assumptions ( right or wrong, doesn't matter) did yo u make yesterday? #faqeerism - If making assumptions was a currency, mos t people would be billionaires. Someone sent you a text ( the second most effortless thing to do 😀 ), you made assumptions based on your mood that time, N OT based on what the sender might have in mind ( texts can't convey tones/ feelings ). You heard someone say something, you picked up one word/ sent ence without knowing the context and assumed an entire conspi racy theory. Someone was not well and not responding , you assumed the per son had changed. Doctor told you something about a symptom and you assumed a m illion things. I can go on but you get the drift. Right ? See, I just made an effortless assumption.... Ha Ha Sunil Sir’s Posts 😂 57 #faqeerism - Assumption is the mother of most goofups. Knowing involves intent and efforts, assumptions are super ea sy and as human beings, we are more gravitated towards easier stuff. And THAT makes all the difference ! #chalfaqeera - Awaken the Faqeera within.... by valida ting more and assuming less. Last evening, on my weekend Little India visit ritual, I saw one cafe closing down. It was a cool cafe, provided the usual cafe food, good ambien ce and lots of board games to spend some chilled out times. I never patronised it because I have my usual list of places that I visit but felt sad seeing it close down. Like really sad ! #faqeerism - Good things have an intrinsic happiness v alue even if they don’t happen to you.","When I lived in Gurgaon, everytime I came back from the nearb y grocery shops, #saprasaab would ask दुकान पर भीड़ थी ? ( Were the shops crowded?) I laughed - Papa, why do you care? Their business, their prob lem. Sunil Sir’s Posts 58 He said - Bete, these guys are providing us essentials of our daily life nearby. If they don’t do brisk business, they migh t shut down and that would cause a great inconvenience to the locality. We need to keep them in business. What a refreshing perspective ! Love you #saprasaab.","My Mumma #mrssapra was principal of a primary govt sch ool in a small village in Gurgaon. Many students were unable to pay even a small school fee and would risk dropping out. Every month, she paid fee for many many students so they coul d continue. Almost half her salary. Once I asked her, why she paid back her hard earned money to the govt. ( who didn’t need it ). She said - “The students get free food when they come to scho ol. For the lack of such a small fee, they would miss out on that nutrition. And if the numbers dwindle, the govt will shut down this scho ol and even the remaining students willl get impacted.” I feel so fortunate to be born to and raised by such enlighte ned souls. ❤️","#faqeerism - Do good, support good, promote good, even if it’s not for your direct benefit. Sunil Sir’s Posts 59 Self interest is very important and shouldn’t be compromised but greater good is probably more needed in self interest. #chalfaqeera - Awaken the Faqeera within… goodness nev er goes unrewarded. There was beautiful movie called Newton. In one of the scenes, the brilliant Sanjay Mishra ( watch Aan khon Dekhi for him ) asks Raj Kumar Rao… Sanjay - Do you know what your problem is? Raj - Yes, my honesty ! Sanjay - No, the arrogance about your honesty.","Running a marathon is my choice and discipline. Being honest is the basic hygiene and a value. Waking up at 4 am is my personal time management. Going to gym is for my own health. Sunil Sir’s Posts 60 Getting rich is my ambition, hard work and luck. These are personal life choices we make. Contrary to what I may like to believe, none of these give me a character certificate or Moral Credits to judge others. Crestfallen on reading this ? 😢","How ? #faqeerism - You either have a Good day or make it a B etter day. So how many GBs of life did you have in this week / month ? 😀 And if you want to go one level up and measure your life in T errabytes - TBs. You can have a Terrific Day and / or make it a Better one. Wanna go another level up? Measure it in PetaBytes - PBs… Perfect day and / or make it a Better one. Nah… Perfection ko improve karna mushkil hi nahi , namumkin h ai. 😉 Sunil Sir’s Posts 67 That’s why the PBs are rare! So, no going after Perfection please . 😀 #chalfaqeera - Awaken the Faqeera within…. By doing th e right measure of your life. Once upon a time, in Ramgarh village, there was a very rich b ut miser Seth who was known not to spend even a dime. One day Dacoit Gabbar Singh landed up at his place and put a gun on his head. Gabbar - Lala, जान देनी है या धन ? ( Death or money?) Lala - Arey bete, Birju bete. जान ही ले जा, धन तो मैंने बुढ़ापे के लिए संभाल कर रखा है. (Better you kill me now as I have preserved the money for old age ). 😂","#faqeerism There are people 1. Those who are earning much more than what they would have expected and yet don't spend on their wants and wishes. Tryin g to save every dollar. You expect your boss, your company, other people to reward yo u but don't want to reward yourself for having come this far in life. How does that work? I am confused... Sunil Sir’s Posts 😉 68 If you spend money on good things ( Nutrition, health, famil y, joy, experiences), you will spend less money on medicines, doctors, stress.","2. Those who have done much better than what they dreamt and it has made them selfish, self centered and more insecure tha n when they didn't have the money and success. They do everyt hing possible to deny others and usurp more & more & more... If you deny others' their rightful share, some day, you will end up paying back 10X in ways that will hurt so much more. H istory repeats itself.","Picture 1 - Sapra Saab engrossed in the first copy of my firs t book which he ensured that I printed. Picture 2 - His last glass of beer with me at Harry's Clarke Quay. ( I was drinking water, I am a teetotaler. 😊) कोई भी ना हो, ना कोई फ़रियाद. सुख दुःख ना हो, ना कोई याद. जाना है मुझे फ़क़ीरा, समय से परे. जीना है मुझे फ़क़ीरा, समय से परे. समय से परे, फ़क़ीरा. समय से परे… #chalfaqeera - Awaken the Faqeera within.... By being fluid, flexible is too rigid. This morning, you received a Facebook request from a school f riend who you last met 30 years back. Would you accept it? Sunil Sir’s Posts 72 If I tell you that many people who once were very close to, y ou've already met them the last time in this lifetime. How wo uld you feel? School friends, childhood neighbors, even many university cla ssmates and ex colleagues. Think !!! And many people who are close to you currently, in couple of years, the same may happen. (More applicable to people who mo ve cities / countries). It is said that by the time your child turns 18, you have alr eady spent 90% of the time with them, in most cases. How does it make you feel?","Continuity is a very selfish word - whether in professional o r personal life. It only says Thank You (TY) to two words of its tribe : #faqeerism - ContinuiTY – ProximiTY and/ or UtiliTY Unless you're in same proximity and have some common interest s or even if you are far, you have some transactional utilit y, the relationship continuity continues. Else, it fades.... and fades fast ! And that's the reason, most people don't want to retire from work life. No one likes to get lonely. Sunil Sir’s Posts 73 Relevance, relevance, relevance !!! Post continues tomorrow.... I will share incredible personal experience and the #faqeerism ( take away). #chalfaqeera - Awaken the Faqeera within... This is what I see first thing every morning from my window. And it fills my day with joy, positivity and optimism. How ? Do you notice the small tree with pink flowers, on the right side? It’s probably the smallest of all and the only one with flowe rs. The other trees are big, green and amazingly towering. This i s happily staying in it’s own zone with only flowers and very less leaves. There are times when flowers shed and since there are very le ss leaves, it looks ugly. But it doesn’t change to conform to the tribe of other trees. Season changes, flowers bloom again and it stands out as a st arkingly beautiful outlier . ❤️","You are carrying a cup of coffee, someone bumps into you and Sunil Sir’s Posts 74 the coffee spills. Faqeera - Why did the coffee spill ? Me - Of course Faqeera, because you bumped into me. Faqeera - No ! Because there was coffee in the cup. If there was tea in the cup, tea would have spilled. #faqeerism - When life bumps you, what comes out is wh at has always been inside. Fill yourself with positivity, joy, optimism, peace and only that will come out when faced with adverse situations. #chalfaqeera - Awaken the Faqeera within…. By being th at pink flowers tree . Today, in the bus, I gave up my seat for an elderly woman ( m ust be 65 +). When she got up at her stop, the back of her T shirt read - 4 2 km finisher. And here I am, counting steps from living room to kitchen as workout… 😂","Of course, it’s #faqeerism time now… Will you take this lady’s example as the light in the quote a nd start focusing on your health today or will you wait for t he heat from doctor to tell you that you need BP/ Diabetes/ C holesterol medications ? Sunil Sir’s Posts 75 Apply it to any aspect of life and not only health. Act when you see light. Don’t wait for the heat to burn you.","Measure your BMR every week and stay in control. B - Body Physical, mental, spiritual health. M - Money Financial health, income, expenses, savings, investments. R - Relationships Personal, Professional, Society #chalfaqeera - Awaken the Faqeera within… get your BMR in place before heat reaches you. Once King Akbar asked WoW ( Wisest of wisest) Birbal to find out how many people in the capital couldn't see and if someth ing could be done for them. Birbal immediately sent few officers to go to very house and collect data for blind people. He took a big lot of yarn and sat on the biggest traffic intersection and started spinning it. People were amused and they asked him - Hey WoW Birbal, what are you doing? Sunil Sir’s Posts 76 Our man didn't bother to reply. He just kept counting - 1, 2, 4, 19, 858, 1884.... King Akbar got to know about it and rushed to the spot and wa s shocked. He asked Birbal - Buddy Birbal, what is it that your are doin g? Birbal, unmoved, kept counting - 8665, 8670 etc Next day he went to the Darbaar and said - Badshah Salamat, h ere is the census of people who can't see. The split is - 686 people who are blind and 11456 people who have eyes and yet can't see. 11456 people saw me spinning yarn and yet asked me what I was doing. 😂 Disclaimer - I can't confirm the authenticity of the story. I wasn't born then.","Every new year, I come up with one word - Just one word tha t's gonna define that year for me. It’s a deep process to come up with a single word where all o f your thoughts and actions are gonna be converged and it tak es weeks of introspection. My last few years' words were - Grow, Leap, Consolidate, Shos hin, No Kaash and my whole life in that year revolved around that theme.","I am in that zone in life where dates, days, quarters and yea rs, and don't matter much. #faqeerism - I do things because I want to, or because they ought to be done. Sunil Sir’s Posts 80 The word is - Reboot ! I have rebooted my soul’s #FaqeeraOS and a new amazing ly lighter, more effective and highly secure version has been installed since last one month. Many legacy permissions, access and APIs have been deleted an d new agentics of viewing & processing information and taking appropriate actions have been incorporated. It is functioning with desired performance so far. 😀 #Rebootfaqeera it is !","And to give respect to the iconic picture in the post, am sha ring two bonus words as well. No, not Karan and Arjun, sill it gate, note - Exit fe e, $200. 😄 #chalfaqeera - Awaken the Faqeera within.... by knowin g your exit paths before entering. How much time does it take to go from what you are doing to w hat you actually want to do? How your life is vs. how you want it to be? Sunil Sir’s Posts 241 Days, weeks, months, sometimes years. Right ! And sometimes - Just one moment.","I was talking to someone who said - Sunil, I didn't have a pl an. I just woke up one day and said - Enough ! I only got one life, almost 2/3rd is already gone sleep walki ng. I am ready to start owning and running the rest of it. No thing else matters to me now. And I never looked back... That's it, one fine day, one fine moment, one decision. Sometimes what we truly want is just one Decision away. It's not always easy, but possible.","Think about it, someone may be alive and healthy for whole 80 years and be dead the next moment. Past 80 years of being ali ve aren't a guarantee for even the next moment. #faqeerism - History isn't necessarily an indication o f future. Sunil Sir’s Posts 242 #chalfaqeera - Awaken the Faqeera within.... by taking the decisions that matter ! Recently, for week long business trip, I stayed in a Taj prop erty after a long time. Same good old service, nice well maintained property, good ve getarian & healthy options in breakfast buffet and overall pr ofessionalism. On a dinner, we wanted to have a Paneer dish but not thick gr avy. We asked them to make Matar Paneer with no/less oil. When it arrived, the gravy was thick, oil floating and salt w as super high. I pointed it out to the server and she got the F & B manager and head chef. I shared my feedback and said - I usually don't complain abou t food ( we are lucky that we have food on our table) but I d idn't expect a pre made thick gravy, frozen peas, 1.5X salt a nd so much oil from Taj dish.","Next morning, when I went for breakfast, everyone treated me as a special guest. Servers all around me, asking me for some special dishes, offering to pack lunch for me etc. 😄 I am not used to so much attention and asked them to let i t go. I had an issue with a dish last night, I pointed it ou t, you took care, matter over. Let's not overdo things... 🙃","Sunil Sir’s Posts 243 #faqeerism - What is the core of your being? If you are a food joint, your core is to provide food that th e customers should feel good and satiated. Ambience, service, location are all important but they aren't the core. The core is food ! If the Core is compromised, the peripheral attributes don't m atter...","6 important factors of every business 1. Why do you exist? ( Core) 2. What is the desired outcome your customers expect? 3. How it is being delivered? 4. Who is accountable for delivering it? 5. When is it needed? 6. Where is it needed? Do you know the Core of your business? Your relationships? Yo ur being? #chalfaqeera - Awaken the Faqeera within..... by takin g good care of your core first ! Sometimes people reach out to me mentioning why I hadn't resp onded to their comment/ message on a post and want to discuss the \"topic\" of that post and persepectives on it. Similarly for an old poem or an old conversation or an incide nt. Sunil Sir’s Posts 244 ========================== My family tells me that, there are times when I am into somet hing and when they approach me, they see a screen saver on. I am listening but not and not responding... I am sure this happens to many/ most of us.","I believe we all operate in zones - Physical, mental, emotion al, spiritiual zones. When I wrote a particular post / poem, it was triggered by a thought, an incident, a situaion that intrigued me, evoked a certain perspective and got converted into a digital form. After sometime, that zone vanished. Location changed, another strong thought came up that consume d the old one, or something else... #faqeerism - Zones are ephemeral in nature. They depend on a combination of things and if one of the cons tituents moves, the zone shifts. I only write or recite when #faqeerazone engulfs me co mpletely. And there isn't any fixed time, topic or pattern to it. Even the perspectives can get 180 degree opposite within few hours.","Most things in life - Thoughts, feelings, relationships, pers Sunil Sir’s Posts 245 pectives, beliefs are transient in nature and dependent on \"Z one of operation\" at that particular moment. I don't know if there is a permanent zone or not. How strongly you feel about something today, may change compl etely in 24 hours. A dear friend told me today - Life is such.... nothing surpri ses me anymore ! Flow... #chalfaqeera - Awaken the Faqeera within..... by livin g the zones fully while they last. Few years back, I watched a movie - Chasing Mavericks, that s tayed in my head. The movie is about Jay Moriarity, who at the age of 16 could surf the highest and wildest of the waves \"Mavericks\" and was a sensation. At 23, he unfortunately died in a freak free diving incident. The person who conquered the wildest waves, died diving. How ironical !","Most of us may know the unfortunate case of Michael Schumache r. The king of F1, who had the unfotunate accident while skiing and had a severe brain injury and there isn't much news about Sunil Sir’s Posts 246 how he is now. I can quote many such examples but what is it that I am tryin g to say.","People and companies don't usually destroy themselves at the areas they are good at. They also usually handle the big issues well and come out of them successfully (Remember the ruckus created by a software update by Crowdstrike and look their stock price now). It is mostly the small things that we take for granted, be ov erconfident about and ignore that come back to hurt..... and hurt a lot. Again, taking the CRWD example, it was a seemingly small auto update that goes right 99999999999.9999999999 times but went wrong just once. #faqeerism - मेरी कश्ती वहाँ डूबी, जहाँ पानी कम था."];

const crackBtn = document.getElementById('crackBtn');
const loader = document.getElementById('loader');
const card = document.getElementById('card');
const fortuneText = document.getElementById('fortuneText');
const themeEl = document.getElementById('themeEl');
const numsEl = document.getElementById('numsEl');
const againBtn = document.getElementById('againBtn');
const errEl = document.getElementById('err');
const copyBtn = document.getElementById('copyBtn');

let usedIdxs = [];

function pickPosts(n) {
  const available = POSTS.map((_,i) => i).filter(i => !usedIdxs.includes(i));
  if (available.length < n) { usedIdxs = []; return pickPosts(n); }
  const chosen = [];
  const pool = [...available];
  while (chosen.length < n) {
    const r = Math.floor(Math.random() * pool.length);
    usedIdxs.push(pool[r]);
    chosen.push(POSTS[pool.splice(r,1)[0]]);
  }
  return chosen;
}

async function getFortune() {
  crackBtn.disabled = true;
  loader.classList.add('on');
  card.classList.remove('on');
  againBtn.classList.remove('on');
  errEl.classList.remove('on');

  const sample = pickPosts(10).join('\n\n---\n\n');

  const prompt = `You are a fortune cookie oracle for a mentor named Sunil Sapra. Below are some of his LinkedIn posts. Extract the single most profound, quotable insight and present it as a fortune cookie.

Rules:
- Must be a genuine insight from the posts, in Sunil's voice — not generic motivation
- 1-3 punchy sentences max
- Also provide a 3-5 word theme label (e.g. "On Fairness" or "On Building")
- Also provide 5 lucky numbers between 1-99

Respond ONLY with valid JSON, no markdown, no preamble:
{"fortune":"...","theme":"On ...","luckyNumbers":[N,N,N,N,N]}

Posts:
${sample}`;

  try {
    const res = await fetch('/.netlify/functions/fortune', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const parsed = await res.json();
    if (parsed.error) throw new Error(JSON.stringify(parsed.error));

    fortuneText.textContent = parsed.fortune;
    themeEl.textContent = parsed.theme;
    numsEl.innerHTML = parsed.luckyNumbers.map(n => `<span class="num">${n}</span>`).join('');

    loader.classList.remove('on');
    card.classList.add('on');
    againBtn.classList.add('on');

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(parsed.fortune);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy fortune'; }, 2000);
    };

  } catch(e) {
    loader.classList.remove('on');
    errEl.textContent = 'The cookie crumbled. Try again. (' + e.message + ')';
    errEl.classList.add('on');
    crackBtn.disabled = false;
  }
}

crackBtn.addEventListener('click', getFortune);
againBtn.addEventListener('click', () => { crackBtn.disabled = false; getFortune(); });
</script>
